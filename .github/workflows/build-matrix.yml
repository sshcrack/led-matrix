name: Build Matrix Reusable

on:
  workflow_call:
    inputs:
      version:
        required: false
        type: string
        default: ''
    secrets:
      GH_PACKAGES_TOKEN:
        required: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: "led-matrix"
            os: ubuntu-latest
            preset: "cross-compile"
            artifact-name: "led-matrix-build"
            requires-toolchain: true
          - name: "desktop-linux"
            os: ubuntu-latest
            preset: "desktop-linux"
            artifact-name: "desktop-linux-build"
            requires-toolchain: false
          - name: "desktop-windows"
            os: windows-latest
            preset: "desktop-windows"
            artifact-name: "desktop-windows-build"
            requires-toolchain: false
    env:
      BUILD_TYPE: RelWithDebInfo
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: react-web/dist/

      - name: Install NSIS
        if: runner.os == 'Windows'
        run: choco install nsis -y

      - uses: awalsh128/cache-apt-pkgs-action@latest
        if: runner.os != 'Windows'
        with:
          packages: libasound2-dev python3-jinja2 pkg-config autoconf autoconf-archive automake libtool python3 linux-libc-dev curl libltdl-dev libx11-dev libxft-dev libxext-dev libwayland-dev libxkbcommon-dev libegl1-mesa-dev libglu1-mesa-dev libibus-1.0-dev mono-complete libxrandr-dev libxrandr2 wayland-protocols extra-cmake-modules xorg-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev libgtk-3-dev libayatana-appindicator3-dev
          version: 1.0

      - name: Update certificates
        if: runner.os != 'Windows'
        run: |
          sudo apt-get update
          sudo apt-get install --reinstall ca-certificates
          sudo update-ca-certificates
          sudo cert-sync /etc/ssl/certs/ca-certificates.crt
          cert-sync --user /etc/ssl/certs/ca-certificates.crt

      - uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.25.0"

      - uses: lukka/run-vcpkg@v11
        with:
          vcpkgConfigurationJsonGlob: "vcpkg-configuration.json"

      - name: Add NuGet sources (Linux)
        if: runner.os != 'Windows'
        shell: bash
        env:
          VCPKG_EXE: ${{ github.workspace }}/vcpkg/vcpkg
          USERNAME: sshcrack
          FEED_URL: https://nuget.pkg.github.com/sshcrack/index.json
        run: |
          mono `${{ env.VCPKG_EXE }} fetch nuget | tail -n 1` \
            sources add \
            -Source "${{ env.FEED_URL }}" \
            -StorePasswordInClearText \
            -Name GitHubPackages \
            -UserName "${{ env.USERNAME }}" \
            -Password "${{ secrets.GH_PACKAGES_TOKEN }}"
          mono `${{ env.VCPKG_EXE }} fetch nuget | tail -n 1` \
            setapikey "${{ secrets.GH_PACKAGES_TOKEN }}" \
            -Source "${{ env.FEED_URL }}"

      - name: Add NuGet sources (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VCPKG_EXE: ${{ github.workspace }}/vcpkg/vcpkg.exe
          USERNAME: sshcrack
          FEED_URL: https://nuget.pkg.github.com/sshcrack/index.json
        run: |
          .$(${{ env.VCPKG_EXE }} fetch nuget) `
            sources add `
            -Source "${{ env.FEED_URL }}" `
            -StorePasswordInClearText `
            -Name GitHubPackages `
            -UserName "${{ env.USERNAME }}" `
            -Password "${{ secrets.GH_PACKAGES_TOKEN }}"
          .$(${{ env.VCPKG_EXE }} fetch nuget) `
            setapikey "${{ secrets.GH_PACKAGES_TOKEN }}" `
            -Source "${{ env.FEED_URL }}"

      - name: Cache cross-compile toolchain
        if: matrix.requires-toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/cross-compile
          key: cross-compile-toolchain-v0.0.1-beta

      - name: Download and extract cross-compile toolchain
        if: matrix.requires-toolchain && steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ runner.temp }}/cross-compile
          cd ${{ runner.temp }}/cross-compile
          wget -O cross-compile.tar.xz "https://github.com/sshcrack/led-matrix/releases/download/v0.0.1-beta/cross-compile.tar.xz"
          tar -xvf cross-compile.tar.xz
          rm cross-compile.tar.xz

      - name: Build ${{ matrix.name }}
        uses: lukka/run-cmake@v10
        with:
          configurePreset: ${{ matrix.preset }}
          configurePresetAdditionalArgs: "['-DSKIP_WEB_BUILD=ON']"
          buildPreset: ${{ matrix.preset }}
          buildPresetAdditionalArgs: ${{ runner.os == 'Windows' && '[''--target'', ''package'', ''--config'', ''RelWithDebInfo'']' || '[''--target'', ''package'']' }}
        env:
          VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/sshcrack/index.json,readwrite"
          CROSS_COMPILE_ROOT: ${{ (matrix.requires-toolchain && format('{0}/cross-compile', runner.temp)) || '' }}

      - name: Upload ${{ matrix.name }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            ${{ matrix.name == 'desktop-linux' && (inputs.version && format('desktop_build/led-matrix-desktop-{0}-Linux.tar.gz', inputs.version) || 'desktop_build/led-matrix-desktop-*-Linux.tar.gz') }}
            ${{ matrix.name == 'desktop-linux' && (inputs.version && format('desktop_build/led-matrix-desktop-{0}-Linux.deb', inputs.version) || 'desktop_build/led-matrix-desktop-*-Linux.deb') }}
            ${{ matrix.name == 'desktop-windows' && (inputs.version && format('desktop_build/led-matrix-desktop-{0}-win64.zip', inputs.version) || 'desktop_build/led-matrix-desktop-*-win64.zip') }}
            ${{ matrix.name == 'desktop-windows' && (inputs.version && format('desktop_build/led-matrix-desktop-{0}-win64.exe', inputs.version) || 'desktop_build/led-matrix-desktop-*-win64.exe') }}
            ${{ matrix.name == 'led-matrix' && (inputs.version && format('build/led-matrix-{0}-arm64.tar.gz', inputs.version) || 'build/led-matrix-*-Linux.tar.gz') }}
            ${{ matrix.name == 'led-matrix' && (inputs.version && format('build/led-matrix-{0}-arm64.deb', inputs.version) || 'build/led-matrix-*-arm64.deb') }}
