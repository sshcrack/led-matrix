name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  react-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: "react-web/pnpm-lock.yaml"

      - name: Install dependencies
        working-directory: react-web
        run: pnpm install

      - name: Build
        working-directory: react-web
        run: pnpm run build

      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: react-web/dist/

  build:
    needs: react-web
    uses: ./.github/workflows/build-matrix.yml
    secrets:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
