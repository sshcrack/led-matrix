name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  pull-requests: write

jobs:
  react-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: "react-web/pnpm-lock.yaml"

      - name: Install dependencies
        working-directory: react-web
        run: pnpm install

      - name: Build
        working-directory: react-web
        run: pnpm run build

      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: react-web/dist/

  build:
    needs: react-web
    uses: ./.github/workflows/build-matrix.yml
    secrets:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

  artifact-comment:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' && always() && needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Post or update PR comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          header="## Build Artifacts"
          body="$header

          | Platform | Download | Files |
          |---|---|---|"

          artifacts_json=$(gh api "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[] | {name, id}')

          for dir in artifacts/*/; do
            dir_name=$(basename "$dir")
            artifact_id=$(echo "$artifacts_json" | jq -r --arg name "$dir_name" 'select(.name == $name) | .id')
            download_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/$artifact_id"

            file_list=""
            first=true
            for file in "$dir"/*; do
              file_name=$(basename "$file")
              size=$(du -h "$file" | cut -f1)
              if [ "$first" = true ]; then
                file_list="\`$file_name\` ($size)"
                first=false
              else
                file_list="$file_list<br>\`$file_name\` ($size)"
              fi
            done

            body+=$'\n'"| $dir_name | [⬇ download]($download_url) | $file_list |"
          done

          existing=$(gh api "/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq ".[] | select(.body | startswith(\"$header\")) | .id")

          if [ -n "$existing" ]; then
            gh api "/repos/${{ github.repository }}/issues/comments/$existing" \
              -X PATCH -f body="$body"
          else
            gh pr comment "${{ github.event.pull_request.number }}" --body "$body"
          fi
