name: Release new version

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  USERNAME: sshcrack
  VCPKG_EXE: ${{ github.workspace }}/vcpkg/vcpkg
  FEED_URL: https://nuget.pkg.github.com/sshcrack/index.json
  VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/sshcrack/index.json,readwrite"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Extract version from CMakeLists.txt
        id: version
        run: |
          VERSION=$(grep -Po 'set\(VERSION \K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          if [ -z "$VERSION" ]; then
            echo "Could not extract version from CMakeLists.txt" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Validate tag matches CMakeLists.txt version
        if: github.event_name == 'push'
        run: |
          EXPECTED="v${{ steps.version.outputs.VERSION }}"
          if [ "$EXPECTED" != "${{ github.ref_name }}" ]; then
            echo "Tag '${{ github.ref_name }}' does not match CMakeLists.txt version '$EXPECTED'" >&2
            exit 1
          fi
          echo "Tag '${{ github.ref_name }}' matches CMakeLists.txt version"

      - name: Check if tag or release exists
        id: check_tag
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          if [ "${{ github.event_name }}" != "push" ]; then
            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG already exists!" >&2
              exit 1
            fi
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists!" >&2
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: "react-web/pnpm-lock.yaml"

      - name: Install React web dependencies
        working-directory: react-web
        run: pnpm install

      - name: Build React web version
        working-directory: react-web
        run: pnpm run build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: react-web/dist/

  build:
    needs: prepare
    uses: ./.github/workflows/build-matrix.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
    secrets:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

  create-release:
    runs-on: ubuntu-latest
    needs: [prepare, build]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        id: create_release
        run: |
          TAG="v${{ needs.prepare.outputs.version }}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "$TAG" | head -n1 || true)

          if [ -n "$PREV_TAG" ]; then
            PRS=$(gh pr list --state merged --search "merged:>=$(git log -1 --format=%aI $PREV_TAG)" --json number,title,author,mergedAt,mergeCommit --jq '.[] | select(.mergeCommit != null) | "- #\(.number) (\(.title)) - (@\(.author.login))"')
            FULL_CHANGELOG_LINK="[**Full Changelog**](https://github.com/${{ github.repository }}/compare/$PREV_TAG...$TAG)"
            if [ -n "$PRS" ]; then
              CHANGELOG=$(cat .github/changelog-template.md | sed "s|{{PRS}}|$PRS|g" | sed "s|{{FULL_CHANGELOG_LINK}}|$FULL_CHANGELOG_LINK|g")
            else
              CHANGELOG=$(cat .github/changelog-no-prs-template.md | sed "s|{{FULL_CHANGELOG_LINK}}|$FULL_CHANGELOG_LINK|g")
            fi
          else
            CHANGELOG="Release v${{ needs.prepare.outputs.version }}"
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$CHANGELOG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload all artifacts to release
        run: |
          TAG="v${{ needs.prepare.outputs.version }}"

          gh release upload "$TAG" artifacts/led-matrix-build/led-matrix-${{ needs.prepare.outputs.version }}-arm64.tar.gz
          gh release upload "$TAG" artifacts/led-matrix-build/led-matrix-${{ needs.prepare.outputs.version }}-arm64.deb

          gh release upload "$TAG" artifacts/desktop-linux-build/led-matrix-desktop-${{ needs.prepare.outputs.version }}-Linux.tar.gz
          gh release upload "$TAG" artifacts/desktop-linux-build/led-matrix-desktop-${{ needs.prepare.outputs.version }}-Linux.deb

          gh release upload "$TAG" artifacts/desktop-windows-build/led-matrix-desktop-${{ needs.prepare.outputs.version }}-win64.zip
          gh release upload "$TAG" artifacts/desktop-windows-build/led-matrix-desktop-${{ needs.prepare.outputs.version }}-win64.exe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
